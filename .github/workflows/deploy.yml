# Build and deploy to GitHub Pages on every push to main.
# public/data is gitignored, so the data pipeline runs here; its source
# downloads (~60 MB) are cached between runs keyed on the pipeline script.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache data-source downloads
        uses: actions/cache@v4
        with:
          path: .cache
          key: bible-data-${{ hashFiles('scripts/fetch-data.mjs') }}

      - run: npm ci

      - name: Build data (BSB text, cross-refs, Strong's, geocoding)
        run: node scripts/fetch-data.mjs

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
